#Esse arquivo faz o mesmo trabalho do application.properties
#porém traz uma forma mais fácil de entender
#O application é como se fosse a central de configuração do spring
#Nele posso definir config como: banco de dados, porta do servidor, logs, etc...

spring:
  application:
    name: sistemaos
  datasource:
    url: jdbc:mysql://localhost:3306/bike_facil
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE